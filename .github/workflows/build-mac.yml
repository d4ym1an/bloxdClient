name: Build macOS

# Builds the macOS .dmg downloads. A .dmg can't be produced on Windows
# (electron-builder needs macOS-only tooling), so this runs on a real macOS
# runner. Trigger it manually from the Actions tab, or push a v* tag to also
# publish the .dmg files to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build macOS .dmg (arm64 + x64)
        run: npm run dist:mac
        env:
          # No Apple Developer cert — build unsigned and don't try to discover one.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload .dmg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blocked-client-macos
          path: dist/*.dmg
          if-no-files-found: error

      - name: Publish to Release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
